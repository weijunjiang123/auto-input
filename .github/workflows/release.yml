name: Release AutoInput

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_name=AutoInput-${VERSION}-macOS" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run core tests
        run: |
          export SWIFTPM_CACHE_PATH="$PWD/.build/swiftpm-cache"
          export CLANG_MODULE_CACHE_PATH="$PWD/.build/module-cache"
          swift run AutoInputCoreTests

      - name: Build debug target
        run: |
          export SWIFTPM_CACHE_PATH="$PWD/.build/swiftpm-cache"
          export CLANG_MODULE_CACHE_PATH="$PWD/.build/module-cache"
          swift build --product AutoInput

      - name: Package app
        run: APP_VERSION="${VERSION#v}" Scripts/build_app.sh
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Sign app locally
        run: codesign --force --deep --sign - dist/AutoInput.app

      - name: Verify app bundle
        run: |
          test -x dist/AutoInput.app/Contents/MacOS/AutoInput
          test -f dist/AutoInput.app/Contents/Resources/AutoInput.icns
          plutil -lint dist/AutoInput.app/Contents/Info.plist
          codesign --verify --deep --strict dist/AutoInput.app

      - name: Archive app
        run: |
          ditto -c -k --keepParent dist/AutoInput.app "dist/${{ steps.version.outputs.artifact_name }}.zip"
          shasum -a 256 "dist/${{ steps.version.outputs.artifact_name }}.zip" > "dist/${{ steps.version.outputs.artifact_name }}.zip.sha256"

      - name: Create DMG
        run: |
          APP_VERSION="${VERSION#v}" \
          DMG_NAME="${{ steps.version.outputs.artifact_name }}.dmg" \
          Scripts/build_dmg.sh
          shasum -a 256 "dist/${{ steps.version.outputs.artifact_name }}.dmg" > "dist/${{ steps.version.outputs.artifact_name }}.dmg.sha256"
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: AutoInput ${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ steps.version.outputs.artifact_name }}.zip
            dist/${{ steps.version.outputs.artifact_name }}.zip.sha256
            dist/${{ steps.version.outputs.artifact_name }}.dmg
            dist/${{ steps.version.outputs.artifact_name }}.dmg.sha256
